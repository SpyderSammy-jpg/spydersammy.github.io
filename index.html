<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SpyderSammy - Search</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .logo { width: 80px; margin-bottom: 10px; }
        h1 { font-size: 2.5rem; margin-bottom: 20px; letter-spacing: 2px; color: #ff0000; text-shadow: 0 0 10px #ff0000; }
        
        /* The Search Bar Container */
        .search-box { width: 80%; max-width: 600px; position: relative; }
        input {
            width: 100%; padding: 15px 25px; border-radius: 50px; border: 2px solid #333;
            background: #111; color: #fff; font-size: 1.1rem; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.4); }

        .desc { margin-top: 15px; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <img src="https://ssl.gstatic.com" class="logo">
    <h1>SPYDER SAMMY</h1>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="Search DuckDuckGo or enter a URL..." autofocus>
    </div>

    <p class="desc">Encrypted with Cloaking & Privacy Protection</p>

    <script>
        const input = document.getElementById('search-input');

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const query = input.value.trim();
                if (query) launchProxy(query);
            }
        });

        function launchProxy(query) {
            // The DayDream X backend gateway
            const proxyBase = "https://dreams.gorich.hk"; 
            
            // Logic: Determine if input is a URL or a Search Query
            let finalUrl;
            const urlPattern = /^(http|https):\/\/[^\s$.?#].[^\s]*$/gm;
            const domainPattern = /^[a-z0-9]+([\-\.]{1}[a-z0-9]+)*\.[a-z]{2,5}(:[0-9]{1,5})?(\/.*)?$/i;

            if (urlPattern.test(query) || domainPattern.test(query)) {
                // If it's a URL, ensure it has http prefix
                finalUrl = query.includes('://') ? query : 'http://' + query;
            } else {
                // If it's a search, use DuckDuckGo
                finalUrl = "https://duckduckgo.com" + encodeURIComponent(query);
            }

            // Step 1: Open about:blank Cloak
            const win = window.open('about:blank', '_blank');
            const doc = win.document;

            // Step 2: Branding (Classroom Icon + Title)
            doc.title = "Home - Classroom";
            const icon = doc.createElement('link');
            icon.rel = 'icon'; 
            icon.href = 'https://ssl.gstatic.com';
            doc.head.appendChild(icon);

            // Step 3: Load Proxy & Encode URL
            // Ultraviolet proxies usually require the URL to be encoded
            const encoded = btoa(finalUrl); // Basic Base64 encoding
            
            const iframe = doc.createElement('iframe');
            // This structure mimics how DayDream X points to its internal browser
            iframe.src = `${proxyBase}/uv/service/${encoded}`; 
            
            iframe.style = "position:fixed; inset:0; width:100%; height:100%; border:none; margin:0; z-index:999999;";
            
            doc.body.appendChild(iframe);
            doc.body.style.margin = "0";
        }
    </script>
</body>
</html>
