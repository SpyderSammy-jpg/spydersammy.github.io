<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home - Classroom</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #ui-layer { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; width: 100%; transition: 0.5s; 
        }

        h1 { font-size: 3.5rem; margin-bottom: 25px; color: #ff0000; text-transform: uppercase; letter-spacing: 8px; text-shadow: 0 0 20px #ff0000; cursor: default; }
        
        .search-box { width: 90%; max-width: 700px; }
        input {
            width: 100%; padding: 20px 35px; border-radius: 60px; border: 2px solid #222;
            background: #0a0a0a; color: #fff; font-size: 1.3rem; outline: none; transition: 0.4s;
            box-sizing: border-box; text-align: center;
        }
        input:focus { border-color: #ff0000; box-shadow: 0 0 30px rgba(255, 0, 0, 0.6); }

        #proxy-frame {
            display: none; position: fixed; inset: 0; width: 100%; height: 100%;
            border: none; background: #fff; z-index: 9999;
        }

        .footer { position: fixed; bottom: 15px; color: #333; font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>SPYDER SAMMY</h1>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search or Enter URL..." autofocus>
        </div>
        <div class="footer">PRESS ` TO PANIC</div>
    </div>

    <iframe id="proxy-frame"></iframe>

    <script>
        const input = document.getElementById('search-input');
        const frame = document.getElementById('proxy-frame');
        const ui = document.getElementById('ui-layer');

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const query = input.value.trim();
                if (query) launch(query);
            }
        });

        // PANIC KEY (Backtick/Tilde `)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Backquote') {
                // Instantly swap to real Classroom and wipe history entry
                window.location.replace("https://classroom.google.com");
            }
        });

        function launch(query) {
            let targetUrl;
            const isUrl = query.includes('.') && !query.includes(' ');
            
            if (isUrl) {
                targetUrl = query.startsWith('http') ? query : 'https://' + query;
            } else {
                targetUrl = "https://duckduckgo.com" + encodeURIComponent(query);
            }

            // Backend Gateway
            const proxyURL = "https://tachyons.pro" + btoa(targetUrl); 

            ui.style.display = "none";
            frame.style.display = "block";
            frame.src = proxyURL;
            document.title = "Home - Classroom";
        }
    </script>
</body>
</html>
