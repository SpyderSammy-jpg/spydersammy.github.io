<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title id="tab-title">Home - Classroom</title>
    <link id="tab-icon" rel="icon" href="https://ssl.gstatic.com">
    <!-- YOU NEED THESE TWO LINES FOR UV TO WORK -->
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>

    <style>
        :root { --theme: #ff0000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Login Screen */
        #login-ui { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10002; }
        
        /* Home Screen */
        #home-ui { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%; position: absolute; background: #000; z-index: 10; }
        
        h1 { font-size: 3.5rem; color: var(--theme); text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 15px var(--theme); }
        .main-input { width: 90%; max-width: 600px; padding: 18px; border-radius: 50px; border: 2px solid #222; background: #0a0a0a; color: #fff; text-align: center; outline: none; font-size: 1.2rem; }

        /* Toolbar - ENSURE DISPLAY IS NONE */
        #toolbar { display: none; position: fixed; top: 0; width: 100%; height: 50px; background: #202124; border-bottom: 2px solid var(--theme); align-items: center; padding: 0 10px; box-sizing: border-box; gap: 8px; z-index: 10001; }
        #nav-input { flex: 1; background: #303134; border: none; border-radius: 20px; padding: 6px 15px; color: white; outline: none; }
        #controls button { background: #303134; border: none; color: white; padding: 6px 10px; border-radius: 6px; cursor: pointer; }

        #frame { display: none; position: fixed; top: 50px; left: 0; width: 100%; height: calc(100% - 50px); border: none; z-index: 999; background: #fff; }
    </style>
</head>
<body>

<div id="login-ui">
    <h1>SPYDER SAMMY</h1>
    <input type="password" id="pass-input" class="main-input" placeholder="Enter Access Code..." autofocus>
</div>

<div id="home-ui">
    <h1>SPYDER SAMMY</h1>
    <input type="text" id="home-search" class="main-input" placeholder="Search DuckDuckGo or Type URL...">
</div>

<div id="toolbar">
    <div id="controls">
        <button onclick="goHome()">🏠</button>
        <button onclick="refreshPage()">⟳</button>
    </div>
    <input type="text" id="nav-input" placeholder="Navigate...">
</div>

<iframe id="frame"></iframe>

<script>
const PASS = "sammy@sab2026";

// This function now uses YOUR local UV files instead of a random link
function launch(query) {
    if (!query) return;
    let target = query.includes('.') && !query.includes(' ') ? 
        (query.startsWith('http') ? query : 'https://' + query) : 
        "https://duckduckgo.com/?q=" + encodeURIComponent(query);

    document.getElementById('home-ui').style.display = "none";
    document.getElementById('frame').style.display = "block";
    
    // UV MAGIC: This encodes the URL so iBoss can't see it
    if (window.__uv$config) {
        document.getElementById('frame').src = __uv$config.prefix + __uv$config.encodeUrl(target);
    } else {
        alert("Ultraviolet is still loading... wait 1 second.");
    }
}

// ACCESS CODE LOGIC
document.getElementById('pass-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.target.value === PASS) {
        document.getElementById('login-ui').style.display = "none"; // Hide Login
        document.getElementById('home-ui').style.display = "flex"; // Show Home
        document.getElementById('toolbar').style.display = "flex"; // ONLY SHOW TOOLBAR NOW
        
        // REGISTER THE SERVICE WORKER (The Tunnel Engine)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./uv/uv.sw.js', { scope: __uv$config.prefix });
        }
    }
});

function goHome() {
    document.getElementById('frame').style.display = "none";
    document.getElementById('home-ui').style.display = "flex";
}

function refreshPage() {
    const frame = document.getElementById('frame');
    frame.src = frame.src;
}

document.getElementById('home-search').addEventListener('keydown', e => { if (e.key === 'Enter') launch(e.target.value); });
document.getElementById('nav-input').addEventListener('keydown', e => { if (e.key === 'Enter') launch(e.target.value); });
</script>
</body>
</html>
