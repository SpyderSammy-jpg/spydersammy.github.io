<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SpyderSammy</title>
    <style>
        :root {
            --red: #ff0000; --black: #000000;
            --yellow: #ffff00; --white: #ffffff;
        }
        body { margin: 0; background: var(--black); color: var(--white); font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #toolbar { background: var(--red); padding: 5px; display: flex; gap: 10px; border-bottom: 3px solid var(--yellow); align-items: center; }
        input { flex-grow: 1; padding: 5px; border: 2px solid var(--black); background: var(--white); }
        button { background: var(--yellow); color: var(--black); border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; }
        #browser-frame { flex-grow: 1; border: none; background: var(--white); }
        .tab-bar { display: flex; background: #333; padding: 2px; }
        .active-tab { background: var(--red); color: white; border: 1px solid var(--yellow); }
    </style>
</head>
<body>
    <div id="toolbar">
        <button onclick="goHome()">🏠 Home</button>
        <button onclick="back()">⬅️</button>
        <button onclick="forward()">➡️</button>
        <button onclick="refresh()">🔄</button>
        <input type="text" id="urlInput" placeholder="Search DuckDuckGo or enter URL..." onkeydown="if(event.key==='Enter') navigate()">
        <button onclick="addBookmark()">⭐ Bookmark (Ctrl+3)</button>
        <button onclick="toggleBlankMode()" id="blankBtn">Mode: Normal</button>
        <button onclick="clearHistory()" style="background:var(--white)">Clear History</button>
    </div>
    <iframe id="browser-frame" src="about:blank"></iframe>

    <script>
        const frame = document.getElementById('browser-frame');
        const input = document.getElementById('urlInput');
        let blankMode = false;

        // Use a proxy prefix to bypass iBoss (e.g., Ultraviolet or a self-hosted one)
        const PROXY_URL = "https://your-proxy-instance.com"; 

        function navigate() {
            let val = input.value;
            // Search DuckDuckGo if not a full URL
            if (!val.includes('.') || val.includes(' ')) {
                val = "https://duckduckgo.com" + encodeURIComponent(val);
            } else if (!val.startsWith('http')) {
                val = "https://" + val;
            }
            
            // Bypass history by using location.replace in the iframe context
            const target = PROXY_URL + val;
            frame.contentWindow.location.replace(target);
            saveHistory(val);
        }

        function goHome() { frame.src = "about:blank"; input.value = ""; }
        function back() { frame.contentWindow.history.back(); }
        function forward() { frame.contentWindow.history.forward(); }
        function refresh() { frame.contentWindow.location.reload(); }

        // Cloudflare KV / Worker Simulation for History/Bookmarks
        function saveHistory(url) {
            let history = JSON.parse(localStorage.getItem('spyderHistory') || '[]');
            history.push({url, time: new Date()});
            localStorage.setItem('spyderHistory', JSON.stringify(history));
        }

        function clearHistory() {
            localStorage.removeItem('spyderHistory');
            alert("History Cleared!");
        }

        function addBookmark() {
            let bookmarks = JSON.parse(localStorage.getItem('spyderBookmarks') || '[]');
            bookmarks.push(input.value);
            localStorage.setItem('spyderBookmarks', JSON.stringify(bookmarks));
            alert("Bookmarked!");
        }

        function toggleBlankMode() {
            blankMode = !blankMode;
            document.getElementById('blankBtn').innerText = blankMode ? "Mode: About:Blank" : "Mode: Normal";
            if (blankMode) {
                // Technique to hide activity from simple URL trackers
                window.history.replaceState(null, null, "about:blank");
            }
        }

        // Hotkeys
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === '3') { e.preventDefault(); addBookmark(); }
            if (e.ctrlKey && e.key === 'j') { e.preventDefault(); console.log(localStorage.getItem('spyderHistory')); alert("History printed to console (Cloudflare Simulation)"); }
        });
    </script>
</body>
</html>
