<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SpyderSammy - Search</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; width: 100%; max-width: 600px; padding: 20px; }
        .logo { width: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 10px #ff0000); }
        h1 { font-size: 3rem; margin-bottom: 20px; color: #ff0000; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 15px #ff0000; }
        
        .search-wrapper { position: relative; width: 100%; }
        input {
            width: 100%; padding: 18px 30px; border-radius: 50px; border: 2px solid #333;
            background: #111; color: #fff; font-size: 1.2rem; outline: none; transition: 0.4s;
            box-sizing: border-box;
        }
        input:focus { border-color: #ff0000; box-shadow: 0 0 25px rgba(255, 0, 0, 0.5); }
        
        .footer { margin-top: 30px; color: #444; font-size: 0.8rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://ssl.gstatic.com" class="logo">
        <h1>SpyderSammy</h1>
        
        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="Search the web or enter URL..." autofocus>
        </div>

        <div class="footer">STAY STEALTHY • SPYDERSAMMY PROXY</div>
    </div>

    <form id="proxy-form" action="https://www.croxyproxy.com_" method="post" target="_blank" style="display:none;">
        <input type="hidden" name="url" id="proxy-url">
    </form>

    <script>
        const input = document.getElementById('search-input');

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const query = input.value.trim();
                if (query) handleSearch(query);
            }
        });

        function handleSearch(query) {
            let targetUrl;
            const isUrl = query.includes('.') && !query.includes(' ');
            
            if (isUrl) {
                targetUrl = query.startsWith('http') ? query : 'https://' + query;
            } else {
                targetUrl = "https://duckduckgo.com" + encodeURIComponent(query);
            }

            // Launching via the proxy form
            document.getElementById('proxy-url').value = targetUrl;
            document.getElementById('proxy-form').submit();
        }
    </script>
</body>
</html>
